<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <img id="pic" src="images/image1.png" style="cursor: pointer;">
    <input type="text" id="name" readonly>

    <script>
        const images = [
            { src: 'images/image1.png', name: 'image1.png' },
            { src: 'images/image2.png', name: 'image2.png' },
            { src: 'images/image3.png', name: 'image3.png' },
            { src: 'images/image4.png', name: 'image4.png' },
            { src: 'images/image5.png', name: 'image5.png' }
        ];

        let current = 0;
        const img = document.getElementById('pic');
        const txt = document.getElementById('name');

        function show() {
            img.src = images[current].src;
            txt.value = images[current].name;
        }

        img.onclick = function() {
            current++;
            if (current >= images.length) current = 0;
            show();
        };

        show();
    </script>
</body>
</html>
