<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, 800, 600);

        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(700, 80, 50, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(160, 120, 35, 0, Math.PI * 2);
        ctx.arc(200, 120, 40, 0, Math.PI * 2);
        ctx.arc(240, 120, 35, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(420, 130, 30, 0, Math.PI * 2);
        ctx.arc(455, 130, 35, 0, Math.PI * 2);
        ctx.arc(490, 130, 30, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#228B22';
        ctx.fillRect(0, 400, 800, 200);

        ctx.fillStyle = '#A0522D';
        ctx.fillRect(250, 220, 180, 180);

        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.moveTo(210, 230);
        ctx.lineTo(340, 100);
        ctx.lineTo(470, 230);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#FFD700';
        ctx.fillRect(320, 350, 40, 50);

        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(270, 260, 50, 50);
        ctx.fillRect(360, 260, 50, 50);

        ctx.strokeStyle = '#654333';
        ctx.lineWidth = 4;
        for (let i = 20; i < 790; i += 40) {
            ctx.beginPath();
            ctx.moveTo(i, 420);
            ctx.lineTo(i, 560);
            ctx.stroke();
        }
        
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, 460);
        ctx.lineTo(800, 460);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(0, 520);
        ctx.lineTo(800, 520);
        ctx.stroke();

        ctx.fillStyle = '#228B22';
        ctx.fillRect(585, 320, 20, 80);
        
        ctx.fillStyle = '#006400';
        ctx.beginPath();
        ctx.arc(595, 270, 70, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(560, 300, 60, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(630, 300, 60, 0, Math.PI * 2);
        ctx.fill();
    </script>
</body>
</html>
